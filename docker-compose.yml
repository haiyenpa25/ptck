version: '3.8'

services:
  cw-quant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cw_quant_dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      # Giữ database và data bên ngoài container (không mất khi update image)
      - ./cw_quant.db:/app/cw_quant.db
      - ./data:/app/data
      - ./alerts:/app/alerts
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cw_network

networks:
  cw_network:
    driver: bridge
